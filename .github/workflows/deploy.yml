name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html

      # Deploy production build to the root of gh-pages.
      # CNAME (tabortmig.jakob.now) is in public/ so Vite copies it into
      # dist/ automatically — no separate CNAME step needed.
      # clean: true removes stale production assets but preserves
      # pull/ preview folders.
      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
          exclude: pull/**
